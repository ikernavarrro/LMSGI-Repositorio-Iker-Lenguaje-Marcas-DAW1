<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="es">
	<head>
		<title>Práctica 11 - Formularios</title>
		<meta http-equiv="Content-Type" content="text/html;charset=utf-8"  />
	</head>
	<body>
		<h1>Formularios</h1>
		<form method="get" action="Práctica11B.html">
			<p>
				Nombre usuario:&nbsp;
				<input  type="text" 
						name="nombreUsuario" 
						size="15" 
						maxlength="15" />
			</p>
			<p>	
				Contraseña:&nbsp;
				<input  type="password"
						name="contraseña"	
						size="15"
						maxlength="15" />
			</p>		
			<p>
				Comentarios: <br />
				<textarea name="comentarios" rows="10" cols="25"></textarea>
			</p>
			<input type="submit" name="enviarDatos" value="Enviar Datos" />	
		</form>	
	</body>
</html>
