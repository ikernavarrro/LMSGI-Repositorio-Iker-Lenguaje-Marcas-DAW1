<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="es">
	<head>
		<title>Práctica 15B</title>
		<meta http-equiv="Content-Type" content="text/html;charset=utf-8"  />
	</head>
	<body>
		<h1>Vota tu película preferida</h1>
		<form method="get" action="https://www.google.com/search">
			<fieldset>
				<legend>Tu Película Favorita</legend>
				<p>
					<!-------------------------------------->
					<input type="radio" name="q" value="127 Horas" id="peli1" />
					<label for="peli1">127 Horas</label> 
					<br /><!-------------------------------->
					<input type="radio" name="q" value="La Sombra Prohibida" id="peli2" />
					<label for="peli2">La Sombra Prohibida</label> 
					<br /><!-------------------------------->
					<input type="radio" name="q" value="La RED" id="peli3" />
					<label for="peli3">La RED</label> 
					<br /><!-------------------------------->
					<input type="radio" name="q" value="La Trampa Del Mal" id="peli4" />
					<label for="peli4">La Trampa Del Mal</label> 
					<br /><!-------------------------------->
					<input type="radio" name="q" value="The Tourist" id="peli5" />
					<label for="peli5">The Tourist</label> 
					<!-------------------------------------->
				</p>
			</fieldset>
			<p>
				<input type="submit" value="Buscar Información" /> <!--Sin name porque solo hay un botón.-->
				<input type="reset" value="Limpiar Selección" />
			</p>
		</form>
	</body>
</html>
