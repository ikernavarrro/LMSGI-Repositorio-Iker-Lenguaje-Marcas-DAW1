<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="es">
	<head>
		<title>Práctica 16 - B (opcional) | Formularios</title>
		<meta http-equiv="Content-Type" content="text/html;charset=utf-8"  />
	</head>
	<body>
		<h1>Formulario de Registro</h1>
		<form method="post" action="mailto:argeme.vila@zabalburu.org" enctype="text/plain">
		<table border="0" width="100%" cellpadding="5" summary="Descripción de la tabla.">
			<tr align="left">
				<td style="width:50%">
					<p>	
						Nombre:&nbsp; <input type="text" name="nombre" size="15" maxlength="15" tabindex="1" />
					</p>
					<p>	
						Primer Apellido:&nbsp; <input type="text" name="primerApellido" size="15" maxlength="15" tabindex="2" />
					</p>
				</td>
				<td style="width:50%">
					<p>	
						Sexo: <br />
						<input type="radio" name="sexo" value="mujer" tabindex="8" /> Mujer <br />
						<input type="radio" name="sexo" value="hombre"  tabindex="9"/> Hombre
					</p>
				</td>
			</tr>
			<tr align="left">
				<td>	
					<p>	
						Segundo Apellido:&nbsp; <input type="text" name="segundoApellido" size="15" maxlength="15" tabindex="3" />
					</p>
					<p>	
						Dirección:&nbsp; <input type="text" name="dir" size="15" maxlength="15" tabindex="4" />
					</p>
				</td>
				<td>
					<p>	
						Turno: <br />
						<input type="radio" name="turno" value="mañana" tabindex="10" /> Mañana <br />
						<input type="radio" name="turno" value="tarde" tabindex="11" /> Tarde
					</p>
				</td>
			</tr>
			<tr align="left">
				<td colspan="2">
					<p>	
						CP:&nbsp; <input type="text" name="cp" size="3" maxlength="5" tabindex="5" />
					</p>
					<p>
						Estados:&nbsp;  <select name="estudios" size="1" tabindex="6" >
											<option value="null">-- Selecciona tus estudios en esta lista --</option>
											<optgroup label="Informática y Comunicaciones">
												<option value="ASIR">Administración de Sistemas Informáticos en Red</option>
												<option value="DAW">Desarrollo de Aplicaciones WEB</option>
												<option value="STI">Sistemas de Telecomunicación e Informáticos</option>
											</optgroup>
											<optgroup label="Comercio y Administración">
												<option value="TL">Transporte y Logística</option>
												<option value="AF">Administración y Finanzas</option>
											</optgroup>
											<optgroup label="Laboratorios">
												<option value="LACC">Laboratorio de Análisis y Control de Calidad</option>
												<option value="AF">Laboratorio Clínico y Biomédico</option>
											</optgroup>
										</select>	
					</p>
				</td>
			</tr>
			<tr align="left">
				<td>
					<p>
						Comentarios: <br />
						<textarea name="comentarios" rows="10" cols="40" tabindex="7">Escribe aquí tus comentarios</textarea>
					</p>
				</td>
				<td>
					<p>
						Idiomas: <br />
						<input type="checkbox" name="idioma_eu" value="euskera" checked="checked" tabindex="12" /> Euskera <br />
						<input type="checkbox" name="idioma_en" value="ingles" tabindex="13" /> Inglés <br />
						<input type="checkbox" name="idioma_de" value="aleman" tabindex="14" /> Alemán
					</p>
				</td>
			</tr>
			<tr align="center">
				<td colspan="2">
					<p>
						<input type="submit" value="Enviar Datos" tabindex="15" /> <!--Sin name porque solo hay un botón.-->
						<input type="reset" value="Limpiar" tabindex="16" />
					</p>
				</td>
			</tr>
		</table>
		</form>
	</body>
</html>
