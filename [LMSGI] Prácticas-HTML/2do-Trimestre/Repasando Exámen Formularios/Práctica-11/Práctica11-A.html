<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="es">
	<head>
		<title>Práctica11 - Formulario</title>
		<meta http-equiv="Content-Type" content="text/html;charset=utf-8"  />
	</head>
	<body>
		<form method="get" action="Práctica11-B.html">
			<h1>Formulario</h1>
			<p>	
				Nombre usuario:<input type="text" 	
				name="nombre"
				size="10"
				maxlength="25"
				value=""
				accesskey="1"
				tabindex="1" />
			</p>
			<p>
				Contraseña:<input type="password"
				name="contraseña"
				size="10"
				maxlength="10"
				value=""
				accesskey="2"
				tabindex="2" />
			</p>
			<p>
				Comentarios:<input type="textarea"
				name="comentarios"
				rows="8"
				cols="25"
				accesskey="3"
				tabindex="3" />
			</p>
			<p>
				<input type="submit"
				name="enviar"
				vale="Enviar Datos"
				accesskey="4"
				tabindex="4" />
			</p>
		</form>
	</body>
</html>
