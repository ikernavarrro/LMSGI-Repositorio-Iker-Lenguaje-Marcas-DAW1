<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="es">
	<head>
		<title>Práctica 16A</title>
		<meta http-equiv="Content-Type" content="text/html;charset=utf-8"  />
	</head>
	<body>
		<h2>Ejemplo uso de atributos <i>accesskey</i> y <i>tabindex</i> y del botón de transferencia de archivos</h2>
		<form>
			<p>
				<label for="nombre">Nombre <i>(Alt + Shift + n)</i>:</label> <br />
				<input type="text" name="nombre" size="10" maxlength="25" accesskey="n" id="nombre" tabindex="1" />
			</p>
			<p>
				<label for="apellidos">Apellidos <i>(Alt + Shift + a)</i>:</label> <br />
				<input type="text" name="apellidos" size="10" maxlength="25" accesskey="a" id="apellido" tabindex="2" />
			</p>
			<p>	
				<label for="dir">Dirección <i>(Alt + Shift + i)</i>:</label> <br />
				<input type="text" name="dir" size="10" maxlength="25" accesskey="i" id="dir" tabindex="3" />
			</p>
			<p>
				<label for="cp">Código Postal <i>(Alt + Shift + c)</i>:</label> <br />
				<input type="text" name="cp" size="5" maxlength="5" accesskey="c" id="cp" tabindex="4" />
			</p>
			<p>
				<label for="ciudad">Ciudad <i>(Alt + Shift + u)</i>:</label> <br />
				<input type="text" name="ciudad" size="10" maxlength="25" accesskey="u" id="ciudad" tabindex="5" />
			</p>
			<p>
				<label for="com">Comentarios <i>(Alt + Shift + o)</i>:</label> <br />
				<textarea name="comentarios" rows="8" cols="25" accesskey="o" tabindex="6" id="com"></textarea>
			</p>
			<p>
				<label for="archivo">Archivo <i>(Alt + Shift + v)</i>:</label> <br />
				<input type="file" name="archivo" size="15" maxlength="25" accept="image/*" id="archivo"  accesskey="v" />
			</p>	
		</form>
	</body>	
</html>
