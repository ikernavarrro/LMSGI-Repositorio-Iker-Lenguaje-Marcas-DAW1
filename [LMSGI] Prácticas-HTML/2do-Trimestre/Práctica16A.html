<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="es">
	<head>
		<title>Práctica 16A</title>
		<meta http-equiv="Content-Type" content="text/html;charset=utf-8"  />
	</head>
	<body>
		<h2>Ejemplo uso de atributos <i>accesskey</i> y <i>tabindex</i> y del botón de transferencia de archivos</h2>
		<form>
			<p>
				Nombre <i>(Alt + Shift + n)</i>: <br />
				<input type="text" name="nombre" size="10" maxlength="25" accesskey="n" id="nombre" />
			</p>
			<p>
				Apellidos <i>(Alt + Shift + a)</i>: <br />
				<input type="text" name="apellidos" size="10" maxlength="25" accesskey="a" id="apellido" />
			</p>
			<p>	
				Dirección <i>(Alt + Shift + i)</i>: <br />
				<input type="text" name="dir" size="10" maxlength="25" accesskey="i" id="dir" />
			</p>
			<p>
				Código Postal <i>(Alt + Shift + c)</i>: <br />
				<input type="text" name="cp" size="3" maxlength="5" accesskey="c" id="cp" />
			</p>
			<p>
				Ciudad <i>(Alt + Shift + u)</i>: <br />
				<input type="text" name="ciudad" size="10" maxlength="25" accesskey="u" id="ciudad" />
			</p>
			<p>
				Comentarios <i>(Alt + Shift + o)</i>: <br />
			</p>
			<p>
				Archivo <i>(Alt + Shift + v)</i>: <br />
			</p>	
		</form>
	</body>	
</html>
