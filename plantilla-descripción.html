<?xml version="1.0" encoding="utf-8"?> <!--Esta es la etiqueta del Prólogo y es opcional en algunos casos. Es para saber si es XML, XHTML o HTML-->
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1-strict.dtd">  <!--Esta es la etiqueta del DOCTYPE (DTD), este SI es obligatorio y va al principio. Sirve para informar al navegador que vocabulario utilizar. Hay 3 tipos, Estricto, transicional y frameset.-->
<html xmlns="http://www.w3.org/1999/xhtml" lang="es"> <!--Este es el principio de la etiqueta HTML y es la raíz del XML y es obligatoria, este contiene varios atributos para designar un nombre para el espacio e indicar el sentido de lectura. -->
	<head> <!--Este es el principio de la etiqueta HEAD, y va después de la etiqueta HTML, aquí se muestra la información importante del documento independientemnete del contenido.-->
		<title>IKER DESCRIPCIÓN</title> <!--Esta es una etiqueta que va dentro de la etiqueta HEAD exclusivamente y es obligatoria, sirve para mostrar el título del documento en la pestaña del navegador. Tiene que tener sentido ya que motores de busqueda la utilizan para referirse al contenido de ella.-->
		<meta http-equiv="Content-Type" content="text/html;charset=utf-8"  /> <!--Esta es la etiqueta META, al contrario de muchas esta se cierra sola, sirve para declarar el sistemade codificación, en este caso UTF-8 y entre otros destacamos etiquetas para asignar palabras clave para motores de busqueda y etiquetas que sirven para realizar algunos ajustes con atributos que no se ven.-->
	</head> <!--Este es el final de la etiqueta HEAD, y va después de todo su contenido, sirve para declarar el fin de la etiqueta HEAD y su uso es obligatorio.-->
	
	<body> <!--Este es el principio de la etiqueta BODY, y va después de la etiqueta HEAD, aquí se muestra el cuerpo del documento que se muestra en el navegador.-->
	<h1>Título1</h1>
<p><h1>Título1</h1><h3>Subtítulo3</h3><br />Hola, me llamo Iker.<hr />25/09/2025</p>



	</body> <!--Este es el final de la etiqueta BODY, y va después de todo su contenido, sirve para declarar el fin de la etiqueta BODY y su uso es obligatorio.-->
</html> <!--Este es el final de la etiqueta HTML, y va después de todo su contenido, sirve para declarar el fin de la etiqueta HTML y su uso es obligatorio.-->
